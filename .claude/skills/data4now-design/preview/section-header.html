<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Eyebrow + section header pattern</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--d4n-paper);font-family:var(--font-body)}
  .card{width:700px;padding:var(--sp-8) var(--sp-6);box-sizing:border-box}
  .eyebrow{font-family:var(--font-display);font-weight:600;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--d4n-teal-deep)}
  .rule{height:2px;width:32px;background:var(--d4n-teal);margin:8px 0 12px}
  .title{font-family:var(--font-display);font-weight:700;font-size:32px;letter-spacing:-0.015em;color:var(--fg-1);margin:0 0 8px;line-height:1.1}
  .lead{font-family:var(--font-body);font-size:15px;color:var(--fg-2);line-height:1.55;max-width:520px;margin:0}
  em{color:var(--d4n-magenta);font-style:normal}
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Stage 2 — Automated ingestion</div>
  <div class="rule"></div>
  <h1 class="title">Apache NiFi replaces all manual data collection</h1>
  <p class="lead">SFTP sensors, email watchers, file-drop folders — every source becomes <em>one validated, audit-trailed pipeline</em> instead of a chain of email forwards.</p>
</div>
</body>
</html>
