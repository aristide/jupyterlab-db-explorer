<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--d4n-paper);font-family:var(--font-body)}
  .card{width:700px;padding:var(--sp-6);box-sizing:border-box}
  .row{display:grid;grid-template-columns:repeat(8,1fr);gap:var(--sp-2)}
  .swatch{display:flex;flex-direction:column;align-items:stretch;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border-1);background:#fff}
  .chip{height:56px}
  .meta{padding:6px 8px}
  .name{font-family:var(--font-display);font-weight:600;font-size:11px;color:var(--fg-1);line-height:1.1}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:1px}
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#FFFFFF;border-bottom:1px solid var(--border-1)"></div><div class="meta"><div class="name">White</div><div class="hex">#FFFFFF</div></div></div>
    <div class="swatch"><div class="chip" style="background:#F4F6FA"></div><div class="meta"><div class="name">Paper</div><div class="hex">#F4F6FA</div></div></div>
    <div class="swatch"><div class="chip" style="background:#E4E9F0"></div><div class="meta"><div class="name">Fog</div><div class="hex">#E4E9F0</div></div></div>
    <div class="swatch"><div class="chip" style="background:#C8D1DD"></div><div class="meta"><div class="name">Mist</div><div class="hex">#C8D1DD</div></div></div>
    <div class="swatch"><div class="chip" style="background:#8A99AE"></div><div class="meta"><div class="name">Steel</div><div class="hex">#8A99AE</div></div></div>
    <div class="swatch"><div class="chip" style="background:#5A6B82"></div><div class="meta"><div class="name">Slate</div><div class="hex">#5A6B82</div></div></div>
    <div class="swatch"><div class="chip" style="background:#2C3E55"></div><div class="meta"><div class="name">Graphite</div><div class="hex">#2C3E55</div></div></div>
    <div class="swatch"><div class="chip" style="background:#0B1F38"></div><div class="meta"><div class="name">Ink</div><div class="hex">#0B1F38</div></div></div>
  </div>
</div>
</body>
</html>
